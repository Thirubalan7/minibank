spring.application.name=project
server.port=${SERVER_PORT:8085}


spring.datasource.url=jdbc:postgresql://localhost:5433/minibankv3
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

security.jwt.secret-key=3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b
jwt.expiration=86400000

spring.redis.host=localhost
spring.redis.port=6379
session.timeout=300

spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.group-id=bank-group
spring.kafka.consumer.auto-offset-reset=earliest
# Avoid protocol mismatch with older Kafka brokers
spring.kafka.consumer.properties.api.version.request=false
spring.kafka.producer.properties.api.version.request=false
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.max-request-size=1048576



springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

